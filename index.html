<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backtest Brewery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Code+Pro:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #FAFAF8;
      --ink:       #111110;
      --muted:     #777770;
      --rule:      #DDDDD8;
      --red:       #B83232;
      --toggle-bg: #E8E8E4;
    }
    [data-theme="dark"] {
      --bg:        #0C0C0B;
      --ink:       #E8E4DB;
      --muted:     #7A7A72;
      --rule:      #252522;
      --red:       #C94040;
      --toggle-bg: #222220;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.75;
      transition: background 0.2s, color 0.2s;
    }

    .page {
      width: min(92%, 760px);
      margin-inline: auto;
      padding-bottom: 5rem;
    }

    /* Journal bar */
    .journal-bar {
      border-bottom: 2px solid var(--ink);
      padding: 0.85rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fadeUp 0.45s ease forwards;
    }

    .bar-left strong { color: var(--ink); font-weight: 500; }

    .bar-right {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .nav-link {
      font-family: 'Source Code Pro', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-link:hover { color: var(--ink); }

    #theme-toggle {
      background: var(--toggle-bg);
      border: none;
      cursor: pointer;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 3px 9px;
      border-radius: 2px;
      transition: color 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #theme-toggle:hover { color: var(--ink); }

    /* Title block */
    .title-block {
      padding: 3.5rem 0 2.8rem;
      border-bottom: 1px solid var(--rule);
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.45s 0.08s ease forwards;
    }

    .paper-title {
      font-size: clamp(2rem, 5vw, 2.9rem);
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    /* Papers section */
    .papers-section {
      padding: 2.8rem 0 0;
      opacity: 0;
      animation: fadeUp 0.45s 0.16s ease forwards;
    }

    .section-heading {
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 0.2rem;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .sec-num {
      font-family: 'Source Code Pro', monospace;
      font-size: 0.72rem;
      color: var(--red);
      font-weight: 400;
    }

    .section-divider {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 0.7rem 0 0;
    }

    /* Empty state */
    .empty-state {
      padding: 3.5rem 0;
      text-align: center;
      border-bottom: 1px solid var(--rule);
    }
    .empty-state p {
      font-family: 'Source Code Pro', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .empty-state span {
      font-size: 0.9rem;
      font-style: italic;
      color: var(--muted);
    }

    /* Paper entry */
    .paper-entry {
      padding: 1.8rem 0;
      border-bottom: 1px solid var(--rule);
      display: grid;
      grid-template-columns: 2rem 1fr;
      gap: 0 1.6rem;
    }
    .paper-entry:last-child { border-bottom: none; }

    .entry-index {
      font-family: 'Source Code Pro', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      padding-top: 0.3rem;
    }

    .entry-title {
      font-size: 1.08rem;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 0.45rem;
      color: var(--ink);
      text-decoration: none;
      display: block;
      transition: color 0.15s;
    }
    .entry-title:hover { color: var(--red); }

    .entry-abstract {
      font-size: 0.87rem;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 0.65rem;
      font-style: italic;
    }

    .entry-meta {
      font-family: 'Source Code Pro', monospace;
      font-size: 0.61rem;
      letter-spacing: 0.055em;
      color: var(--muted);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .entry-meta .meta-tag { color: var(--ink); }
    .meta-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--rule);
      display: inline-block;
      vertical-align: middle;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .paper-entry { grid-template-columns: 1fr; gap: 0.3rem; }
      .entry-index { display: none; }
      .journal-bar { flex-wrap: wrap; gap: 0.6rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="journal-bar">
    <strong>Backtest Brewery</strong>
    <div class="bar-right">
      <a href="about.html" class="nav-link">About</a>
      <button id="theme-toggle" aria-label="Toggle theme">
        <span id="toggle-icon">◐</span>
        <span id="toggle-label">Dark</span>
      </button>
    </div>
  </div>

  <div class="title-block">
    <h1 class="paper-title">Backtest Brewery</h1>
  </div>

  <section class="papers-section">
    <h2 class="section-heading">
      <span class="sec-num">§ 1</span> Research
    </h2>
    <hr class="section-divider" />

  <div class="paper-entry">
    <span class="entry-index">[1]</span>
    <div>
      <a href="posts/benfords-law-anomaly-detector.html" class="entry-title">
        Benford's Law as a Market Anomaly Detector
      </a>
      <p class="entry-abstract">
        The first digit of your returns can tell you when to stop making returns.
      </p>
      <div class="entry-meta">
        <span>2025-05-17</span>
        <span class="meta-dot"></span>
        <span class="meta-tag">Research</span>
        <span class="meta-dot"></span>
        <span>12 min read</span>
      </div>
    </div>
  </div>

    <div class="empty-state">
      <p>No entries yet</p>
      <span>Research forthcoming — check back soon.</span>
    </div>

  </section>

</div>
<script>
  (function () {
    var root = document.documentElement;
    var btn  = document.getElementById('theme-toggle');
    var icon = document.getElementById('toggle-icon');
    var lbl  = document.getElementById('toggle-label');
    function apply(t) {
      root.setAttribute('data-theme', t);
      localStorage.setItem('bb-theme', t);
      icon.textContent = t === 'dark' ? '◑' : '◐';
      lbl.textContent  = t === 'dark' ? 'Light' : 'Dark';
    }
    apply(root.getAttribute('data-theme') || 'light');
    btn.addEventListener('click', function () {
      apply(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  })();
</script>
</body>
</html>
